<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Escritorio</title>
        <link rel="stylesheet" href="css/escritorio.css">
        <script src="js/escritorio.js" defer></script>
    </head>
    <body>
        <!--Escritorio con cada icono dentro-->
        <div class="desktop">
            <div class="desktop-icons">
                <div class="desktop-icon" id="icon-phantom-blood">
                    <img src="assets/imgs/phantomBlood.png"
                        alt="Phantom Blood">
                    Phantom Blood
                </div>
                <div class="desktop-icon" id="icon-battle-tendency">
                    <img src="assets/imgs/battleTendecy.png"
                        alt="Battle Tendency">
                    Battle Tendency
                </div>
                <div class="desktop-icon" id="icon-stardust-crusaders">
                    <img src="assets/imgs/stardustCrusaders.png"
                        alt="Stardust Crusaders">
                    Stardust Crusaders
                </div>
                <div class="desktop-icon" id="icon-diamond-is-unbreakable">
                    <img src="assets/imgs/crazyDiamond.png"
                        alt="Diamond Is Unbreakable">
                    Diamond Is Unbreakable
                </div>
                <div class="desktop-icon" id="icon-golden-wind">
                    <img src="assets/imgs/goldenWind.png" alt="Golden Wind">
                    Golden Wind
                </div>
                <div class="desktop-icon" id="icon-stone-ocean">
                    <img src="assets/imgs/stoneOcean.png" alt="Stone Ocean">
                    Stone Ocean
                </div>
                <div class="desktop-icon" id="icon-steel-ball-run">
                    <img src="assets/imgs/steelBall.png"
                        alt="Steel Ball Run">
                    Steel Ball Run
                </div>
                <div class="desktop-icon" id="icon-jojolion">
                    <img src="assets/imgs/jojolion.png" alt="JoJolion">
                    JoJolion
                </div>
                <div class="desktop-icon" id="icon-the-jojolands">
                    <img src="assets/imgs/jojolands.png" alt="The JoJoLands">
                    The JoJoLands
                </div>
            </div>

            <!-- barra de tareas -->
            <div class="taskbar">
                <div class="taskbar-icon" title="User" id="taskbarUser">
                    <img src="assets/imgs/UserIcon.png" alt="User"
                        style="width:32px;">
                </div>
                <div id="userLabel" class="user-label"></div>

                <div class="taskbar-icon" title="Musica">
                    <img src="assets/imgs/music.png" alt="musica"
                        style="width:32px;">
                </div>
                <div class="taskbar-icon" title="Salir">
                    <a><img src="assets/imgs/power.png" alt="Salir"
                            style="width:32px;"></a>
                </div>
            </div>
        </div>
    </body>
</html>
