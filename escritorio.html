<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Escritorio - JoJo's Desktop</title>
        <link rel="icon" href="assets/imgs/FavIcon.png" type="image/png">
        <link rel="stylesheet" href="css/escritorio.css">
        <script src="js/escritorio.js" defer></script>
    </head>
    <body>
        <!-- Skip link para accesibilidad -->
        <a href="#main-content" class="skip-link">Saltar al contenido principal</a>
        
        <!-- Área principal del escritorio -->
        <div class="desktop" role="main" id="main-content">
            <!-- Iconos del escritorio -->
            <nav class="desktop-icons" aria-label="Partes de JoJo's Bizarre Adventure">
                <a href="partes.html?part=Phantom%20Blood" class="desktop-icon" id="icon-phantom-blood" role="button" tabindex="0">
                    <img src="assets/imgs/phantomBlood.png" alt="Icono de Phantom Blood">
                    Phantom Blood
                </a>
                <a href="partes.html?part=Battle%20Tendency" class="desktop-icon" id="icon-battle-tendency" role="button" tabindex="0">
                    <img src="assets/imgs/battleTendecy.png" alt="Icono de Battle Tendency">
                    Battle Tendency
                </a>
                <a href="partes.html?part=Stardust%20Crusaders" class="desktop-icon" id="icon-stardust-crusaders" role="button" tabindex="0">
                    <img src="assets/imgs/stardustCrusaders.png" alt="Icono de Stardust Crusaders">
                    Stardust Crusaders
                </a>
                <a href="partes.html?part=Diamond%20is%20Unbreakable" class="desktop-icon" id="icon-diamond-is-unbreakable" role="button" tabindex="0">
                    <img src="assets/imgs/crazyDiamond.png" alt="Icono de Diamond Is Unbreakable">
                    Diamond Is Unbreakable
                </a>
                <a href="partes.html?part=Vento%20Aureo" class="desktop-icon" id="icon-golden-wind" role="button" tabindex="0">
                    <img src="assets/imgs/goldenWind.png" alt="Icono de Vento Aureo">
                    Vento Aureo
                </a>
                <a href="partes.html?part=Stone%20Ocean" class="desktop-icon" id="icon-stone-ocean" role="button" tabindex="0">
                    <img src="assets/imgs/stoneOcean.png" alt="Icono de Stone Ocean">
                    Stone Ocean
                </a>
                <a href="partes.html?part=Steel%20Ball%20Run" class="desktop-icon" id="icon-steel-ball-run" role="button" tabindex="0">
                    <img src="assets/imgs/steelBall.png" alt="Icono de Steel Ball Run">
                    Steel Ball Run
                </a>
                <a href="partes.html?part=JoJolion" class="desktop-icon" id="icon-jojolion" role="button" tabindex="0">
                    <img src="assets/imgs/jojolion.png" alt="Icono de JoJolion">
                    JoJolion
                </a>
                <a href="partes.html?part=The%20JoJoLands" class="desktop-icon" id="icon-the-jojolands" role="button" tabindex="0">
                    <img src="assets/imgs/jojolands.png" alt="Icono de The JoJoLands">
                    The JoJoLands
                </a>
            </nav>

            <!-- barra de tareas -->
            <nav class="taskbar" aria-label="Barra de tareas">
                <button class="taskbar-icon" id="taskbarUser" aria-label="Usuario: haz clic para cerrar sesión">
                    <img src="assets/imgs/UserIcon.png" alt="Icono de usuario">
                    <div id="userLabel" class="user-label" aria-live="polite"></div>
                </button>

                <button class="taskbar-icon muted" id="taskbarMusic" aria-label="Control de música: haz clic para silenciar o activar">
                    <img src="assets/imgs/music.png" alt="Icono de música">
                </button>
                <div class="volume-container">
                    <label for="volumeSlider" class="visually-hidden">Control de volumen</label>
                    <input
                        type="range"
                        id="volumeSlider"
                        min="0"
                        max="100"
                        value="60"
                        aria-label="Volumen de música">
                </div>

                <button class="taskbar-icon" id="taskbarPower" aria-label="Apagar: haz clic para cerrar la sesión">
                    <img src="assets/imgs/power.png" alt="Icono de apagar">
                </button>
            </nav>
        </div>
        
        <!-- Audio de fondo (iframe oculto para accesibilidad) -->
        <iframe
            id="youtube-audio"
            width="1"
            height="1"
            src="https://www.youtube.com/embed/o28852--bFE?autoplay=1&loop=1&playlist=o28852--bFE&mute=1&controls=0&enablejsapi=1"
            allow="autoplay; encrypted-media"
            frameborder="0"
            title="Audio de fondo"
            aria-hidden="true">
        </iframe>

    </body>
</html>
