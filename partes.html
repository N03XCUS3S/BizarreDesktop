<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Partes - JoJo's Desktop</title>
        <link rel="icon" href="assets/imgs/FavIcon.png" type="image/png">
        <link rel="stylesheet" href="css/partes.css">
        <script src="js/partes.js" defer></script>
    </head>
    <body>
        <a href="#main-content" class="skip-link">Saltar al contenido principal</a>
        <header id="header">
            <h1 id="page-title"></h1>
            <nav aria-label="Navegación principal">
                <a href="escritorio.html">Volver al escritorio</a>
            </nav>
        </header>
        <main id="main-content">
            <div class="part" role="banner" aria-label="Banner de la parte">
            </div>
            <div class="principal">
                <div class="info">
                    <h2>Resumen</h2>
                    <p></p>
                </div>
                <div class="characters" id="characters-section">
                    <h2>Personajes</h2>
                    <div id="characters-list" role="list" aria-label="Lista de personajes"></div>
                </div>
                <div class="mapas" id="mapas">
                    <h2>Localizaciones</h2>
                    <img id="mapa-imagen" alt="Mapa de la parte">
                </div>
                <div class="manga" id="manga">
                    <h2>Manga</h2>
                    <img id="manga-imagen" alt="Portada del manga">
                </div>
            </div>
            <aside aria-label="Navegación de la página">
                <nav>
                    <a href="escritorio.html">Escritorio</a>
                    <a href="#res">Resumen</a>
                    <a href="#characters-section">Personajes</a>
                    <a href="#mapas">Localizaciones</a>
                    <a href="#manga">Manga</a>
                </nav>
            </aside>
        </main>
        <footer id="foot" aria-label="Pie de página">
            <p>© 2024 JoJo's Desktop</p>
        </footer>
    </body>
</html>
