<!DOCTYPE html>
<html lang="es">
    <head>
        <title>JoJo's Desktop</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" href="assets/imgs/FavIcon.png" type="image/png">
        <link href="css/index.css" rel="stylesheet">
        <script src="js/index.js" defer></script>
        <script type="module"
            src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>

    </head>
    <body>
        <canvas id="starsCanvas"></canvas>
        <div class="space-bg">
            <div class="glow"></div>
            <div class="stars"></div>
        </div>
        <model-viewer id="laptop"
            src="assets/models/laptop.glb"
            camera-controls
            exposure="1"
            shadow-intensity="1"
            environment-image="">

            <!-- Hotspot invisible centrado en la pantalla -->
            <button
                id="pantallaHotspot"
                slot="hotspot-screen"
                data-position="0.035 0.11 -0.1"
                data-normal="0 0 1"
                >
            </button>

        </model-viewer>
        <div id="transition" class="transition"></div>

    </body>
</html>
